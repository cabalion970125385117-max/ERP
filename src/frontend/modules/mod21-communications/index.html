<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MOD-21 Communications — ATCA-ERP</title>
  <link rel="stylesheet" href="/assets/css/bootstrap.min.css" />
  <link rel="stylesheet" href="/assets/fonts/bootstrap-icons.css" />
  <link rel="stylesheet" href="/assets/css/atca-erp.css" />
</head>
<body>
<nav class="navbar navbar-dark px-3 py-2" style="background:#1A2520;">
  <a class="navbar-brand fw-bold" href="/index.html">ATCA-ERP</a>
  <span class="text-white-50 small">MOD-21 · Communications & Announcements · AS9100D §7.4</span>
  <div id="nav-alerts" class="text-white small"></div>
</nav>

<div class="container-fluid px-4 py-3">
  <div class="row g-3 mb-4">
    <div class="col-6 col-md-3"><div class="kpi-card rag-green"><div class="kpi-label">Active Announcements</div><div id="kpi-active" class="kpi-value">—</div></div></div>
    <div class="col-6 col-md-3"><div class="kpi-card rag-amber"><div class="kpi-label">Unacknowledged</div><div id="kpi-unack" class="kpi-value">—</div></div></div>
    <div class="col-6 col-md-3"><div class="kpi-card rag-red"><div class="kpi-label">Urgent Unread</div><div id="kpi-urgent" class="kpi-value">—</div></div></div>
    <div class="col-6 col-md-3"><div class="kpi-card rag-green"><div class="kpi-label">Expired This Week</div><div id="kpi-expired" class="kpi-value">—</div></div></div>
  </div>

  <div class="d-flex justify-content-between mb-3">
    <span class="fw-semibold">Announcements Board</span>
    <button class="btn btn-primary btn-sm" onclick="openNewModal()"
      data-compliance="AS9100D §7.3, §7.4" data-linked="MOD-21" data-action-desc="Publish new announcement to all or targeted staff">
      <i class="bi bi-megaphone me-1"></i>New Announcement
    </button>
  </div>

  <div id="announcements-container" class="row g-3"></div>
</div>

<!-- New Announcement Modal -->
<div class="modal fade" id="announcementModal" tabindex="-1">
  <div class="modal-dialog modal-lg"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title">Publish Announcement</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body">
      <div class="mb-2"><label class="form-label">Title *</label><input id="an-title" class="form-control form-control-sm" /></div>
      <div class="row g-2 mb-2">
        <div class="col-md-4"><label class="form-label">Priority</label>
          <select id="an-priority" class="form-select form-select-sm"><option>NORMAL</option><option>IMPORTANT</option><option>URGENT</option></select>
        </div>
        <div class="col-md-4"><label class="form-label">Target Roles (comma-sep, blank=all)</label><input id="an-roles" class="form-control form-control-sm" placeholder="e.g. NDT_INSPECTOR,SUPERVISOR" /></div>
        <div class="col-md-4"><label class="form-label">Expires At</label><input id="an-expires" type="datetime-local" class="form-control form-control-sm" /></div>
      </div>
      <div class="mb-2"><label class="form-label">Body *</label><textarea id="an-body" class="form-control form-control-sm" rows="5"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
      <button class="btn btn-primary btn-sm" onclick="saveAnnouncement()"
        data-compliance="AS9100D §7.4" data-linked="MOD-21" data-action-desc="Publish announcement — immediately visible to targeted staff">Publish</button>
    </div>
  </div></div>
</div>

<script src="/assets/js/bootstrap.bundle.min.js"></script>
<script src="/assets/js/atca-core.js?v=4"></script>
<script>
'use strict';
const announcementModal = new bootstrap.Modal(document.getElementById('announcementModal'));

async function init() {
  await ATCA.initPage();
  await loadKpis();
  loadAnnouncements();
  ATCA.tooltips.init();
}

async function loadKpis() {
  const d = await ATCA.api.get('/mod21/alerts/summary');
  if (!d) return;
  document.getElementById('kpi-active').textContent = d.active_announcements ?? '—';
  document.getElementById('kpi-unack').textContent = d.unacknowledged ?? '—';
  document.getElementById('kpi-urgent').textContent = d.urgent_count ?? '—';
  document.getElementById('kpi-expired').textContent = d.expired_this_week ?? '—';
  if ((d.urgent_count || 0) > 0)
    document.getElementById('nav-alerts').innerHTML = `<span class="badge bg-danger">${d.urgent_count} Urgent</span>`;
}

async function loadAnnouncements() {
  const data = await ATCA.api.get('/mod21/announcements');
  const container = document.getElementById('announcements-container');
  const items = data || [];
  if (!items.length) { container.innerHTML = '<div class="col-12 text-muted text-center py-4">No announcements.</div>'; return; }
  const priorityColor = { URGENT: 'danger', IMPORTANT: 'warning', NORMAL: 'primary' };
  container.innerHTML = items.map(a => `
    <div class="col-md-6 col-lg-4">
      <div class="card h-100 border-${priorityColor[a.priority] || 'primary'} shadow-sm">
        <div class="card-header d-flex justify-content-between align-items-center py-2">
          <span class="fw-semibold">${a.title}</span>
          <span class="badge bg-${priorityColor[a.priority] || 'primary'}">${a.priority}</span>
        </div>
        <div class="card-body py-2">
          <p class="card-text small mb-2">${a.body}</p>
          <small class="text-muted">Published by ${a.published_by_name} · ${new Date(a.published_at).toLocaleDateString()}</small>
          ${a.expires_at ? `<br><small class="text-muted">Expires: ${new Date(a.expires_at).toLocaleDateString()}</small>` : ''}
        </div>
        <div class="card-footer py-2 d-flex justify-content-between align-items-center">
          ${a.acknowledged
            ? '<span class="text-success small"><i class="bi bi-check-circle"></i> Acknowledged</span>'
            : `<button class="btn btn-sm btn-outline-success" onclick="acknowledge(${a.announcement_id})"
                data-compliance="AS9100D §7.4" data-linked="MOD-21" data-action-desc="Acknowledge receipt of this announcement">
                <i class="bi bi-check2"></i> Acknowledge
               </button>`
          }
          ${a.target_roles ? `<small class="text-muted">→ ${a.target_roles}</small>` : '<small class="text-muted">All Staff</small>'}
        </div>
      </div>
    </div>`).join('');
  ATCA.tooltips.init();
}

function openNewModal() { announcementModal.show(); }

async function saveAnnouncement() {
  const r = await ATCA.api.post('/mod21/announcements', {
    title: document.getElementById('an-title').value.trim(),
    body: document.getElementById('an-body').value.trim(),
    priority: document.getElementById('an-priority').value,
    target_roles: document.getElementById('an-roles').value.trim() || null,
    expires_at: document.getElementById('an-expires').value || null,
  });
  if (r) { announcementModal.hide(); ATCA.toast('Announcement published', 'success'); loadAnnouncements(); loadKpis(); }
}

async function acknowledge(id) {
  const r = await ATCA.api.post(`/mod21/announcements/${id}/acknowledge`, {});
  if (r) { ATCA.toast('Acknowledged', 'success'); loadAnnouncements(); loadKpis(); }
}

init();
</script>
</body>
</html>
